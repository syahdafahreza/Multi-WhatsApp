name: Build Windows Exe

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [ia32, x64, arm64]

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build (.exe)
        run: npm run build -- --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List Output Files (Debugging)
        run: Get-ChildItem -Recurse dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Multi-WhatsApp-Installer-${{ matrix.arch }}
          path: dist/*.exe
          if-no-files-found: error
